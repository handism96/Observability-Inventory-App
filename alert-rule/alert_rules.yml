groups:
- name: cadvisor-alerts
  rules:
  - alert: ContainerDown
    expr: time() - container_last_seen{name!=""} > 60
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Container instance is down"
      description: "Container on {{ $labels.instance }} has been unreachable for more than 1 minute."

  - alert: HighContainerCPUUsage
    expr: rate(container_cpu_usage_seconds_total{job="cadvisor"}[2m]) > 0.8
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage in container"
      description: "Container {{ $labels.container_label_com_docker_swarm_task_name }} is using >80% CPU."

  - alert: HighContainerMemoryUsage
    expr: sum(container_memory_working_set_bytes{name!=""}) > 1000000000   # ~1GB
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High memory usage in container"
      description: "Container {{ $labels.container_label_com_docker_swarm_task_name }} is using >1GB memory."
